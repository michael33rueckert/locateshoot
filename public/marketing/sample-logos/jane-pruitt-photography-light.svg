<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Jane Pruitt Photography">
  <defs>
    <style>
      .wordmark    { font-family: 'Playfair Display', 'Cormorant Garamond', Georgia, serif; font-weight: 600; font-style: italic; fill: #f9f6f1; }
      .tagline     { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 500; letter-spacing: 0.32em; text-transform: uppercase; fill: rgba(249,246,241,0.7); }
      .ornament    { stroke: #c4922a; stroke-width: 1.4; fill: none; }

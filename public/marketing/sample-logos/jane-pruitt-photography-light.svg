  </g>
  <text class="wordmark" x="240" y="118" font-size="62" text-anchor="middle">Jane Pruitt</text>
  <text class="tagline" x="240" y="158" font-size="13" text-anchor="middle">Photography</text>
  <g transform="translate(240,180)">
    <line class="ornament" x1="-60" y1="0" x2="60" y2="0" />
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Jane Pruitt Photography monogram">
  <defs>
    <style>
      .ring  { fill: none; stroke: #c4922a; stroke-width: 2; }
      .mono  { font-family: 'Playfair Display', 'Cormorant Garamond', Georgia, serif; font-weight: 600; font-style: italic; fill: #1a1612; }
      .micro { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 500; letter-spacing: 0.32em; text-transform: uppercase; fill: #6b5f52; }
      .bg    { fill: #f9f6f1; }
    </style>
  </defs>
  <!-- soft cream background disc -->
  <circle class="bg" cx="100" cy="100" r="98" />
  <!-- gold ring -->
  <circle class="ring" cx="100" cy="100" r="92" />
  <!-- monogram JP -->
  <text class="mono" x="100" y="118" font-size="74" text-anchor="middle">JP</text>
  <!-- tiny tagline at bottom -->
  <text class="micro" x="100" y="158" font-size="9" text-anchor="middle">Photography</text>
</svg>

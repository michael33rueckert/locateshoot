<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Hawthorn &amp; Field monogram">
  <defs>
    <style>
      .bg          { fill: #f9f6f1; }
      .ring        { fill: none; stroke: #c4922a; stroke-width: 2; }
      .stroke-gold { stroke: #c4922a; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .fill-gold   { fill: #c4922a; }
      .letter      { font-family: 'Playfair Display', 'Cormorant Garamond', Georgia, serif; font-weight: 600; font-style: italic; fill: #1a1612; }
      .amp         { fill: #c4922a; }
      .micro       { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 500; letter-spacing: 0.32em; text-transform: uppercase; fill: #6b5f52; }
    </style>
  </defs>

  <!-- Cream disc + gold ring -->
  <circle class="bg"   cx="100" cy="100" r="98" />
  <circle class="ring" cx="100" cy="100" r="92" />

  <!-- Small camera mark above the monogram letters -->
  <g transform="translate(100, 70)">
    <path class="stroke-gold" d="M -7 -9 L -7 -12 Q -7 -13 -6 -13 L 6 -13 Q 7 -13 7 -12 L 7 -9" />
    <rect class="stroke-gold" x="-19" y="-9" width="38" height="19" rx="2" />
    <circle class="stroke-gold" cx="0" cy="1" r="6.5" />
    <circle class="stroke-gold" cx="0" cy="1" r="3" />
    <circle class="fill-gold" cx="13" cy="-6" r="1.1" />
  </g>

  <!-- Monogram H&F -->
  <text x="100" y="138" font-size="42" text-anchor="middle">
    <tspan class="letter">H</tspan><tspan class="letter amp">&amp;</tspan><tspan class="letter">F</tspan>
  </text>

  <!-- Tiny tagline -->
  <text class="micro" x="100" y="166" font-size="9" text-anchor="middle">Photography</text>
</svg>

<!--
  LocateShoot app icon — gold (#c4922a) disc with a serif "L" matching the
  Playfair Display logo wordmark. The L is path-based (not <text>) so it
  renders identically regardless of which fonts the rasterizer has installed.
  512×512 — every other size is generated from this single source.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <circle cx="256" cy="256" r="256" fill="#c4922a"/>
  <!-- Serif "L" glyph, centered, ink-on-gold (#1a1612). Hand-traced from
       Playfair Display Black; vertical stem on left with thicker top serif,
       wider horizontal foot with two angled serifs at the corners. -->
  <path fill="#1a1612" d="
    M 152 130
    L 232 130
    L 232 148
    L 220 148
    Q 210 148 207 154
    Q 204 160 204 174
    L 204 354
    L 280 354
    Q 296 354 304 348
    Q 312 342 318 326
    L 332 290
    L 348 290
    L 340 380
    L 152 380
    L 152 362
    L 164 362
    Q 174 362 177 356
    Q 180 350 180 336
    L 180 174
    Q 180 160 177 154
    Q 174 148 164 148
    L 152 148
    Z
  "/>
</svg>
